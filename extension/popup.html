<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 240px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  padding: 16px;
  background: #fff;
  color: #1f2328;
}
h2 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  font-size: 13px;
}
.label { color: #656d76; }
/* Toggle switch */
.switch {
  position: relative;
  width: 36px;
  height: 20px;
}
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute;
  inset: 0;
  background: #d0d7de;
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.2s;
}
.slider:before {
  content: "";
  position: absolute;
  width: 16px;
  height: 16px;
  left: 2px;
  bottom: 2px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}
.switch input:checked + .slider { background: #0969da; }
.switch input:checked + .slider:before { transform: translateX(16px); }
/* Select */
select {
  border: 1px solid #d0d7de;
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 12px;
  color: #1f2328;
  background: #f6f8fa;
  cursor: pointer;
}
.footer {
  margin-top: 8px;
  padding-top: 10px;
  border-top: 1px solid #d0d7de;
  font-size: 11px;
  color: #8b949e;
  text-align: center;
}
</style>
</head>
<body>
<h2>
  <svg width="18" height="18" viewBox="0 0 16 16" fill="#0969da"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25V1.75zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V5h-3.25A1.75 1.75 0 0 1 8.25 3.25V1.5H3.75z"/></svg>
  MD Viewer
</h2>
<div class="row">
  <span class="label">Enabled</span>
  <label class="switch">
    <input type="checkbox" id="enabled">
    <span class="slider"></span>
  </label>
</div>
<div class="row">
  <span class="label">Theme</span>
  <select id="theme">
    <option value="auto">Auto</option>
    <option value="light">Light</option>
    <option value="dark">Dark</option>
  </select>
</div>
<div class="footer">Reload the page after changes</div>
<script src="popup.js"></script>
</body>
</html>
